server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Repli SPA : l'application n'a qu'un point d'entrée. Sans cette règle,
    # toute URL autre que « / » renvoie une 404 nginx — c'est ce qui arrive
    # aujourd'hui quand un joueur ouvre un lien profond depuis l'écran d'accueil
    # de son téléphone (une PWA installée démarre sur `start_url`, mais Safari
    # restaure parfois la dernière adresse visitée).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Les fichiers produits par Vite portent une empreinte dans leur nom
    # (`index-a1b2c3.js`) : ils ne changent jamais à contenu identique, on peut
    # donc les mettre en cache sans limite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html et le manifeste, en revanche, ne doivent JAMAIS être servis
    # depuis le cache : c'est ce fichier qui pointe vers la nouvelle empreinte
    # après un déploiement. Sans cela, un joueur reste bloqué sur l'ancienne
    # version jusqu'à ce qu'il vide son cache.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # Compression : le bundle React passe d'environ 300 Ko à 90 Ko sur le
    # réseau, ce qui se voit au premier chargement en 4G.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # En-têtes de sécurité de base. Pas de CSP stricte ici : les styles sont en
    # ligne dans toute l'application (choix assumé du design system) et une CSS
    # policy sans `unsafe-inline` casserait l'affichage.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
}
