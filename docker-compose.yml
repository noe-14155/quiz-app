services:
  quiz-api:
    build: ./backend
    container_name: quiz-api
    restart: unless-stopped
    ports:
      # Phase de test (accès direct via http://TON_IP:${EXTERNAL_PORT}) :
      - "${EXTERNAL_PORT}:8000"
      # Une fois nginx configuré en reverse proxy devant, remplace la ligne
      # ci-dessus par celle-ci pour n'autoriser que le trafic local :
      # - "127.0.0.1:${EXTERNAL_PORT}:8000"
    volumes:
      # Chemin défini dans .env (ou dans les variables d'environnement du
      # stack Portainer) — jamais codé en dur ici.
      - ${DATA_DIR}:/app/data
    environment:
      - DATA_DIR=/app/data
      - ADMIN_BOOTSTRAP_SECRET=${ADMIN_BOOTSTRAP_SECRET}

  quiz-frontend:
    build:
      context: ./frontend
      args:
        # Valeur figée directement ici plutôt qu'en variable Portainer : cette
        # dernière s'est révélée peu fiable (disparaît après certains "Pull
        # and redeploy"). Si le domaine change un jour, modifie cette ligne
        # puis redéploie.
        VITE_API_BASE_URL: https://noe.crabdance.com
    container_name: quiz-frontend
    restart: unless-stopped
    ports:
      # Interface du quiz, accessible directement via http://TON_IP:${FRONTEND_PORT}
      - "${FRONTEND_PORT}:80"
